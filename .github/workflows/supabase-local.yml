name: Supabase Local Verification

on:
  workflow_dispatch:

jobs:
  database:
    name: Local migrations and lint
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.107.0
          github-token: ${{ github.token }}

      - name: Verify local Supabase database
        run: npm run verify:db
